<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive CSS Components</title>
  <link rel="stylesheet" href="interactive.css">
</head>
<body>
  <div class="container">
    <h1>Interactive CSS Components</h1>

    <!-- Component 1: Animated Button -->
    <section>
      <h2>Animated Button</h2>
      <button class="btn">Hover Me</button>
    </section>

    <!-- Component 2: Card Flip -->
    <section>
      <h2>Card Flip Component</h2>
      <div class="flip-card">
        <div class="flip-card-inner">
          <div class="flip-card-front">
            <h3>Front Side</h3>
            <p>Hover to flip!</p>
          </div>
          <div class="flip-card-back">
            <h3>Back Side</h3>
            <p>Hidden content revealed!</p>
          </div>
        </div>
      </div>
    </section>

    <!-- Component 3: Dropdown Menu -->
    <section>
      <h2>Dropdown Menu</h2>
      <div class="menu">
        <div class="menu-header">Menu ▼</div>
        <ul class="menu-items">
          <li>Home</li>
          <li>About</li>
          <li>Services</li>
          <li>Contact</li>
        </ul>
      </div>
    </section>
  </div>
</body>
</html>
