<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lab 15 - To-Do List (Solution)</title>
  <link rel="stylesheet" href="solution-styles.css">
</head>
<body>
  <div class="container">
    <h1>My To-Do List</h1>
    
    <div class="input-section">
      <input 
        type="text" 
        id="taskInput" 
        placeholder="Enter a new task..."
      >
      <button id="addBtn">Add Task</button>
    </div>
    
    <ul id="taskList"></ul>
    
    <div class="footer">
      <span id="taskCount">0 tasks remaining</span>
      <div>
        <button id="clearCompleted" class="footer-btn">Clear Completed</button>
        <button id="clearAll" class="footer-btn danger">Clear All</button>
      </div>
    </div>
  </div>

  <script src="solution-script.js"></script>
</body>
</html>
