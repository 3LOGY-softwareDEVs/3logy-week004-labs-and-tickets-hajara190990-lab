<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enhanced Task Dashboard</title>
  <link rel="stylesheet" href="dashboard.css">
</head>
<body>
  <div class="dashboard">
    <h1>Task Dashboard</h1>

    <!-- Add Task Section -->
    <div class="add-task">
      <input type="text" id="taskInput" placeholder="Enter a new task">
      <select id="prioritySelect">
        <option value="low">Low</option>
        <option value="medium">Medium</option>
        <option value="high">High ⚠️</option>
      </select>
      <button id="addBtn">Add Task</button>
    </div>

    <!-- Filters & Sorting -->
    <div class="controls">
      <div class="filters">
        <button data-filter="all">All</button>
        <button data-filter="active">Active</button>
        <button data-filter="completed">Completed</button>
      </div>
      <div class="sort">
        <button data-sort="priority">Sort by Priority</button>
        <button data-sort="date">Sort by Date</button>
      </div>
    </div>

    <!-- Task List -->
    <ul id="taskList"></ul>
    <p id="count"></p>

    <!-- Statistics -->
    <div class="stats">
      <p>Total: <span id="totalCount">0</span></p>
      <p>Active: <span id="activeCount">0</span></p>
      <p>Completed: <span id="completedCount">0</span></p>
      <p>Completion: <span id="completionPercent">0%</span></p>
    </div>
  </div>

  <script src="dashboard.js"></script>
</body>
</html>
